name: Verify handbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run syntax, data, docs, smoke and quality checks
        run: npm run verify

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright runtime
        run: npm install --no-save playwright@1.61.1

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run verify:browser
